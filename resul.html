<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>🦴 Osteoarthritis Results</title>
<style>
  body{font-family:"Segoe UI",sans-serif;margin:0;padding:20px;background:#f9fafc;color:#1e293b}
  .container{max-width:900px;margin:auto}
  h1{text-align:center;margin-bottom:20px}
  .card{background:#fff;border-radius:14px;padding:18px;box-shadow:0 6px 18px rgba(0,0,0,0.05);margin-bottom:20px}
  .row{display:flex;gap:20px;flex-wrap:wrap}
  .col{flex:1;min-width:250px}
  .thumb{border:1px solid #e2e8f0;border-radius:10px;overflow:hidden}
  .thumb img{width:100%;height:auto;display:block}
  .result{margin-top:10px}
  .result div{margin:6px 0;font-size:15px}
  .gradcam{margin-top:12px;text-align:center}
  .btn{display:inline-block;padding:10px 16px;border-radius:10px;background:#6366f1;color:#fff;text-decoration:none;font-weight:600}
</style>
</head>
<body>
<div class="container">
  <h1>🦴 YOUR RESULTS</h1>

  <div class="card">
    <div class="row">
      <div class="col">
        <h3>Original X-ray</h3>
        <div class="thumb">
          <img src="https://upload.wikimedia.org/wikipedia/commons/8/85/Xray_knee.jpg" alt="Xray demo">
        </div>
      </div>

      <!-- Grad-CAM -->
      <div class="col">
        <h3>Grad-CAM Heatmap</h3>
        <div class="thumb">
          <img src="https://miro.medium.com/v2/resize:fit:800/format:webp/1*h3K8TnS9nRzvE_6EBJjC4Q.png" alt="GradCAM demo">
        </div>
      </div>
    </div>

    <!-- Prediction values -->
    <div class="result">
      <div>🦴 <strong>Pain score:</strong> 42 / 100</div>
      <div>🦴 <strong>Severity :</strong> 2 (Mild)</div>
    </div>
  </div>

  <div style="text-align:center">
    <a href="recom.html" class="btn">View Recommendations 🦴</a>
  </div>
</div>
</body>
</html>
